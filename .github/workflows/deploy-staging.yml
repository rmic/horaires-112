name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      STAGING_ALIAS_DOMAIN: ${{ secrets.STAGING_ALIAS_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply staging migrations
        run: npx prisma migrate deploy

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview deployment
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel preview
        id: deploy
        run: echo "deployment_url=$(vercel deploy --prebuilt --token=\"$VERCEL_TOKEN\")" >> "$GITHUB_OUTPUT"

      - name: Alias staging deployment
        if: env.STAGING_ALIAS_DOMAIN != ''
        run: vercel alias set "${{ steps.deploy.outputs.deployment_url }}" "$STAGING_ALIAS_DOMAIN" --token="$VERCEL_TOKEN"
