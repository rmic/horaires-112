name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: horaire112
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d horaire112"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/horaire112?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/horaire112?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/horaire112?schema=test_auth
      TEST_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/horaire112?schema=test_auth
      AUTH_SECRET: ci-auth-secret
      NEXTAUTH_URL: http://localhost:3000
      ALLOW_OPEN_MANAGER_ACCESS: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Auth tests
        run: npm run test:auth
